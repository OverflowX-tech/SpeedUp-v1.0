<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeedUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7C3AED"/>
              <stop offset="1" stop-color="#EC4899"/>
            </linearGradient>
          </defs>
          <rect width="28" height="28" rx="8" fill="url(#g1)"/>
          <path d="M9 8L21 14L9 20V8Z" fill="white" opacity="0.95"/>
          <path d="M12 10.5L20 14L12 17.5V10.5Z" fill="rgba(124,58,237,0.5)"/>
        </svg>
        <span class="logo-text">SpeedUp</span>
      </div>
      <span class="badge">v1.0</span>
    </header>

    <!-- Current speed display -->
    <div class="speed-display-wrapper">
      <div class="speed-ring">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52" />
          <circle class="ring-progress" id="ring-progress" cx="60" cy="60" r="52" />
        </svg>
        <div class="speed-value" id="speed-value">1×</div>
        <div class="speed-label">SPEED</div>
      </div>
    </div>

    <!-- Preset buttons -->
    <div class="preset-section">
      <div class="section-label">Quick Presets</div>
      <div class="preset-grid">
        <button class="preset-btn" data-speed="0.5">0.5×</button>
        <button class="preset-btn" data-speed="0.75">0.75×</button>
        <button class="preset-btn active" data-speed="1">1×</button>
        <button class="preset-btn" data-speed="1.25">1.25×</button>
        <button class="preset-btn" data-speed="1.5">1.5×</button>
        <button class="preset-btn" data-speed="1.75">1.75×</button>
        <button class="preset-btn" data-speed="2">2×</button>
        <button class="preset-btn highlight" data-speed="2.5">2.5×</button>
        <button class="preset-btn highlight" data-speed="3">3×</button>
        <button class="preset-btn highlight" data-speed="4">4×</button>
        <button class="preset-btn highlight" data-speed="5">5×</button>
        <button class="preset-btn highlight" data-speed="8">8×</button>
      </div>
    </div>

    <!-- Fine-tune slider -->
    <div class="slider-section">
      <div class="section-label">Fine Tune</div>
      <div class="slider-row">
        <button class="step-btn" id="btn-minus" title="Decrease speed">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <div class="slider-track-wrapper">
          <input type="range" id="speed-slider" min="0.25" max="16" step="0.25" value="1" />
          <div class="slider-labels">
            <span>0.25×</span>
            <span>8×</span>
            <span>16×</span>
          </div>
        </div>
        <button class="step-btn" id="btn-plus" title="Increase speed">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="2" rx="1" fill="currentColor"/><rect x="7" y="3" width="2" height="10" rx="1" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <!-- Custom speed input -->
    <div class="custom-section">
      <div class="section-label">Custom Speed</div>
      <div class="custom-row">
        <input type="number" id="custom-input" min="0.25" max="16" step="0.05" placeholder="e.g. 3.5" />
        <button class="apply-btn" id="btn-apply">Apply</button>
      </div>
    </div>

    <!-- Keyboard shortcuts -->
    <div class="shortcuts-section">
      <div class="section-label">Shortcuts</div>
      <div class="shortcut-row"><kbd>Alt</kbd> + <kbd>.</kbd> <span>Speed up</span></div>
      <div class="shortcut-row"><kbd>Alt</kbd> + <kbd>,</kbd> <span>Slow down</span></div>
      <div class="shortcut-row"><kbd>Alt</kbd> + <kbd>0</kbd> <span>Reset 1×</span></div>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      Works on YouTube, Coursera, Udemy, and any HTML5 video
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
